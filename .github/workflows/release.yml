name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    outputs:
      tag: ${{ steps.tag.outputs.version }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
    
    - name: Set tag output
      id: tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 5
    
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/latest
    
    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: release-apk
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "app/build/outputs/apk/release/*.apk"
        tag: ${{ github.ref }}
        name: "Space Shooter ${{ needs.build.outputs.tag }}"
        body: |
          ## Release ${{ needs.build.outputs.tag }}
          
          ### Downloads
          - **Release APK**: [SpaceShooter-${{ needs.build.outputs.tag }}-unsigned.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SpaceShooter-${{ needs.build.outputs.tag }}-unsigned.apk)
          - **Debug APK**: Get from the Actions artifacts if needed
          
          ### Build Info
          - **Date**: ${{ steps.date.outputs.date }}
          - **Commit**: ${{ github.sha }}
          
          Built automatically by GitHub Actions.
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
        allowEmptyRelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
