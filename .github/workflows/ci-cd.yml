name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
  release:
    types: [published]

env:
  JAVA_VERSION: '17'

jobs:
  # =========================================
  # JOB 1: Build APK (always runs)
  # =========================================
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
      is_release: ${{ steps.version.outputs.is_release }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Build release APK
      run: ./gradlew assembleRelease --no-daemon || echo "Release build skipped (no keystore)"
    
    - name: Extract version tag
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "is_release=true" >> $GITHUB_OUTPUT
        else
          echo "tag=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "is_release=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
    
    - name: Upload release APK
      if: steps.version.outputs.is_release == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: apk-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
    
    - name: Verify build
      run: |
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "✓ Build successful!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "✗ Build failed!"
          exit 1
        fi

  # =========================================
  # JOB 2: E2E Tests (manual only to avoid timeout issues)
  # =========================================
  e2e-tests:
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: apk-debug
    
    - name: Boot Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        emulator-options: -no-snapshot -noaudio -no-window -gpu swiftshader_indirect
        script: |
          echo "Waiting for emulator to boot..."
          sleep 60
          echo "Emulator ready"
    
    - name: Wait for device
      run: adb wait-for-device
    
    - name: Install APK
      run: adb install -r app/build/outputs/apk/debug/app-debug.apk
    
    - name: Launch app
      run: |
        adb shell am start -n com.spaceshooter/.MainActivity
        sleep 5
    
    - name: Run E2E Tests
      run: |
        echo "=========================================="
        echo "E2E SMOKE TEST"
        echo "=========================================="
        
        echo ""
        echo "1. Checking if app is installed..."
        PACKAGE_CHECK=$(adb shell pm list packages | grep com.spaceshooter)
        if [ -n "$PACKAGE_CHECK" ]; then
          echo "   ✓ PASS: App is installed"
        else
          echo "   ✗ FAIL: App not installed"
          exit 1
        fi
        
        echo ""
        echo "2. Checking if app is running..."
        PROCESS_CHECK=$(adb shell ps -A | grep com.spaceshooter)
        if [ -n "$PROCESS_CHECK" ]; then
          echo "   ✓ PASS: App is running"
        else
          echo "   ✗ FAIL: App not running"
          exit 1
        fi
        
        echo ""
        echo "3. Taking screenshot..."
        adb shell screencap -p /sdcard/screen.png
        adb pull /sdcard/screen.png ./
        echo "   ✓ Screenshot saved"
        
        echo ""
        echo "4. Checking for crashes..."
        adb logcat -d -t 100 > ./logcat.txt
        CRASHES=$(grep -i "FATAL\|crash\|exception" ./logcat.txt | grep com.spaceshooter | head -5)
        if [ -z "$CRASHES" ]; then
          echo "   ✓ PASS: No crashes detected"
        else
          echo "   ✗ FAIL: Crashes found:"
          echo "$CRASHES"
          exit 1
        fi
        
        echo ""
        echo "=========================================="
        echo "ALL TESTS PASSED!"
        echo "=========================================="
    
    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-results
        path: |
          ./screen.png
          ./logcat.txt
        retention-days: 7
    
    - name: Cleanup
      if: always()
      run: |
        echo "Cleaning up..."
        adb emu kill 2>/dev/null || true

  # =========================================
  # JOB 3: Create Release (automatic on tag push)
  # =========================================
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download release APK
      uses: actions/download-artifact@v4
      if: needs.build.outputs.is_release == 'true'
      with:
        name: apk-release
    
    - name: Download debug APK
      uses: actions/download-artifact@v4
      with:
        name: apk-debug
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Prepare release files
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk "SpaceShooter-${{ needs.build.outputs.version }}-debug.apk"
        if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          cp app/build/outputs/apk/release/app-release-unsigned.apk "SpaceShooter-${{ needs.build.outputs.version }}-unsigned.apk"
        fi
        ls -la *.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          SpaceShooter-${{ needs.build.outputs.version }}-debug.apk
          SpaceShooter-${{ needs.build.outputs.version }}-unsigned.apk
        name: "Space Shooter ${{ needs.build.outputs.version }}"
        body: |
          ## Release ${{ needs.build.outputs.version }}
          
          ### Downloads
          - **Debug APK**: `SpaceShooter-${{ needs.build.outputs.version }}-debug.apk`
          - **Release APK (unsigned)**: `SpaceShooter-${{ needs.build.outputs.version }}-unsigned.apk`
          
          ### Build Info
          - **Date**: ${{ steps.date.outputs.date }}
          - **Commit**: ${{ github.sha }}
          - **Workflow**: [${{ github.workflow }} #${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          Built automatically by GitHub Actions.
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================
  # JOB 4: Deploy Website
  # =========================================
  deploy-website:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    concurrency:
      group: "pages"
      cancel-in-progress: false
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'website'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
